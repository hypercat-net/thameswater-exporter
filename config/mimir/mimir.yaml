# Minimal single-process Mimir for LOCAL TESTING of the Thames Water exporter.
# NOT a production configuration, and NOT meant to be merged into an existing
# Mimir. If you already run Mimir, copy only the `limits` below into your tenant
# overrides or global limits (see README "Mimir limits for historical remote_write").

multitenancy_enabled: false

usage_stats:
  enabled: false

server:
  http_listen_port: 9009
  grpc_listen_port: 9095
  log_level: info

blocks_storage:
  backend: filesystem
  filesystem:
    dir: /data/blocks
  bucket_store:
    sync_dir: /data/tsdb-sync
  tsdb:
    dir: /data/tsdb

compactor:
  data_dir: /data/compactor
  sharding_ring:
    kvstore:
      store: memberlist

distributor:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist

ingester:
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: memberlist
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/ruler

limits:
  # Backfilled hourly samples are up to ~7 days old and may land out-of-order in
  # the ingester head. An existing Mimir often needs these three limits on the
  # target tenant (see README). There is no limit named reject_old_samples_max_age.
  reject_old_samples: false
  out_of_order_time_window: 168h
  past_grace_period: 168h
  query_ingesters_within: 168h
