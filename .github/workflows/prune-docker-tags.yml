name: Prune Docker sha tags

on:
  schedule:
    # After weekly image rebuild (CI cron is 04:17 UTC Sunday).
    - cron: "30 5 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: List tags only, do not delete
        type: boolean
        default: true
      max_age_days:
        description: Delete sha-* tags older than this many days
        type: number
        default: 90

permissions:
  contents: read

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Prune old sha-* Docker tags
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/thameswater-exporter
          MAX_AGE_DAYS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.max_age_days || 90 }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
        run: python scripts/prune_docker_sha_tags.py
