services:
  exporter:
    image: hypercat42/thameswater-exporter:latest
    container_name: thameswater-exporter
    restart: unless-stopped
    env_file: .env
    environment:
      THAMESWATER_EXPORTER_REMOTE_WRITE_URL: "http://mimir:9009/api/v1/push"
      THAMESWATER_EXPORTER_MIMIR_TENANT: "anonymous"
      THAMESWATER_EXPORTER_BACKFILL_DAYS: "7"   # hourly data is only available for the last 7 days
      THAMESWATER_EXPORTER_POLL_INTERVAL_SECONDS: "3600"
      THAMESWATER_EXPORTER_STATE_FILE: "/data/state.json"
    volumes:
      - exporter-state:/data
    ports:
      - "9100:9100"   # self-metrics / health: http://localhost:9100/metrics
    depends_on:
      - mimir

  mimir:
    image: grafana/mimir:latest
    container_name: mimir
    restart: unless-stopped
    command:
      - -config.file=/etc/mimir/mimir.yaml
    volumes:
      - ./config/mimir/mimir.yaml:/etc/mimir/mimir.yaml:ro
      - mimir-data:/data
    ports:
      - "9009:9009"    # Mimir HTTP (push at /api/v1/push, query at /prometheus)

volumes:
  exporter-state:
  mimir-data:
